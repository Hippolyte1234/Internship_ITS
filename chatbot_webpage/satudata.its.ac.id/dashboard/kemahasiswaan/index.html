      <h2>Send Text to Local Ollama</h2>
      <textarea id="promptInput" placeholder="Type your prompt for Ollama here..."></textarea>
      <button id="sendBtn" onclick="sendToOllama()">Send to Local AI</button>

      <h3>AI Response:</h3>
      <div id="responseBox">Waiting for input...</div>

      <script>
        async function sendToOllama() {
            const prompt = document.getElementById("promptInput").value;
            const responseBox = document.getElementById("responseBox");
            const btn = document.getElementById("sendBtn");
            
            if (!prompt.trim()) return alert("Please type something first!");

            responseBox.innerText = "Thinking...";
            btn.disabled = true;

            try {
                // Adjust "llama3" to match whatever model you have installed locally
                const response = await fetch("http://127.0.0.1:5050/ask-ai", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        text: prompt
                    })
                });

                if (!response.ok) throw new Error("Could not connect to Ollama.");

                const data = await response.json();
                if (data && data.message && data.message.content) {
                    // This extracts: 'Hello! 👋 How is your day going? Is there something I can help you with today?'
                    responseBox.innerText = data.message.content;
                } else if (data && data.response) {
                    // Fallback if you update the Python gateway later
                    responseBox.innerText = data.response;
                } else if (data && data.error) {
                    responseBox.innerText = "Error: " + data.error;
                } else {
                    responseBox.innerText = "Error: Could not extract text. Full payload:\n" + JSON.stringify(data);
                }

            } catch (error) {
                responseBox.innerText = "Error: Make sure Ollama is running and OLLAMA_ORIGINS='*' is set in your terminal.";
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }
      </script>
