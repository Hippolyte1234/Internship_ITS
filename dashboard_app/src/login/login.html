<section class="login-shell" aria-labelledby="login-title">
  <div class="login-card">
    <div class="branding">
      <p class="eyebrow">Dashboard access</p>
      <h1 id="login-title">Sign in</h1>
      <p>Sign in with your Firebase account to access the dashboard experience.</p>
    </div>

    @if (!isLoggedIn()) {
      <form class="login-form" [formGroup]="loginForm" (ngSubmit)="submitLogin()">
        <label class="field">
          <span>Email</span>
          <input formControlName="email" type="email" autocomplete="email" placeholder="name@company.com" />
        </label>

        <label class="field">
          <span>Password</span>
          <input formControlName="password" type="password" autocomplete="current-password" placeholder="Enter password" />
        </label>

        @if (authMessage()) {
          <p class="message error">{{ authMessage() }}</p>
        }

        <button type="submit" [disabled]="isSubmitting()">Continue</button>
        <button type="button" class="secondary" (click)="goToRegister()">Create an account</button>
      </form>
    } @else {
      <div class="success-panel" role="status">
        <p class="eyebrow">Welcome back</p>
        <h2>{{ currentUserName() }}</h2>
        <p>{{ authMessage() }}</p>
        <button type="button" class="secondary" (click)="goToDashboard()">Go to Dashboard</button>
      </div>
    }
  </div>
</section>
